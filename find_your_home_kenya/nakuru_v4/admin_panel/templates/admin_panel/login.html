<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--navy:#050d1a;--cyan:#00e5ff;--border:rgba(0,229,255,0.18);--white:white;--white-40:rgba(255,255,255,0.4);--white-10:rgba(255,255,255,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 50% 40%,rgba(0,60,120,0.3),transparent 70%);pointer-events:none;}
    .box{background:rgba(10,22,40,0.98);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:380px;backdrop-filter:blur(16px);position:relative;z-index:1;}
    .icon{width:52px;height:52px;border-radius:14px;background:rgba(0,229,255,0.1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--cyan);margin:0 auto 20px;}
    h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:6px;}
    p{text-align:center;color:var(--white-40);font-size:0.85rem;margin-bottom:28px;}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:0.78rem;color:var(--white-40);margin-bottom:7px;}
    .form-input{width:100%;padding:12px 16px;border-radius:12px;background:var(--white-10);border:1px solid var(--border);color:var(--white);font-size:0.9rem;font-family:'DM Sans',sans-serif;}
    .form-input:focus{outline:none;border-color:var(--cyan);}
    .btn{width:100%;padding:13px;border-radius:50px;background:var(--cyan);color:var(--navy);font-weight:700;font-size:0.95rem;border:none;cursor:pointer;margin-top:8px;font-family:'Syne',sans-serif;}
    .btn:hover{background:#33ebff;}
    .msg{padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:14px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;}
  </style>
</head>
<body>
<div class="box">
  <div class="icon"><i class="fas fa-shield-alt"></i></div>
  <h2>Admin Access</h2>
  <p>Restricted area — authorized personnel only.</p>

  {% if messages %}
  {% for msg in messages %}
  <div class="msg"><i class="fas fa-exclamation-triangle"></i> {{ msg }}</div>
  {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" required autocomplete="off"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" required/>
    </div>
    <button type="submit" class="btn">Enter</button>
  </form>
</div>
</body>
</html>
