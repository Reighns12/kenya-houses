<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – Find Your Home Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--navy:#050d1a;--navy-2:#0a1628;--cyan:#00e5ff;--border:rgba(0,229,255,0.18);--white:white;--white-40:rgba(255,255,255,0.4);--white-10:rgba(255,255,255,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(0,100,180,0.2),transparent 70%);pointer-events:none;}
    .auth-box{background:rgba(10,22,40,0.95);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;backdrop-filter:blur(16px);position:relative;z-index:1;}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
    .logo-box{width:36px;height:36px;border-radius:9px;background:var(--cyan);display:flex;align-items:center;justify-content:center;}
    .logo-box i{color:var(--navy);}
    .logo-text{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;}
    .logo-text span{color:var(--cyan);}
    h2{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;margin-bottom:6px;}
    .auth-sub{color:var(--white-40);font-size:0.88rem;margin-bottom:32px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:0.78rem;color:var(--white-40);margin-bottom:7px;font-weight:500;}
    .form-input{width:100%;padding:12px 16px;border-radius:12px;background:var(--white-10);border:1px solid var(--border);color:var(--white);font-size:0.9rem;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .form-input:focus{outline:none;border-color:var(--cyan);}
    .btn-submit{width:100%;padding:14px;border-radius:50px;background:var(--cyan);color:var(--navy);font-weight:700;font-size:0.95rem;border:none;cursor:pointer;margin-top:8px;transition:all 0.2s;font-family:'Syne',sans-serif;}
    .btn-submit:hover{background:#33ebff;transform:translateY(-1px);}
    .auth-footer{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--white-40);}
    .auth-footer a{color:var(--cyan);text-decoration:none;font-weight:500;}
    .messages{margin-bottom:16px;}
    .msg{padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
    .msg-error{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;}
    .msg-warning{background:rgba(255,200,0,0.1);border:1px solid rgba(255,200,0,0.3);color:#ffc800;}
    .divider{border:none;border-top:1px solid var(--white-10);margin:24px 0;}
  </style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">
    <div class="logo-box"><i class="fas fa-house"></i></div>
    <div class="logo-text">Find Your <span>Home Kenya</span></div>
  </div>
  <h2>Welcome Back</h2>
  <p class="auth-sub">Login to browse listings and find your home.</p>

  {% if messages %}
  <div class="messages">
    {% for msg in messages %}
    <div class="msg msg-{{ msg.tags }}"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-input" placeholder="your@email.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" placeholder="Your password" required/>
    </div>
    <button type="submit" class="btn-submit">Login <i class="fas fa-arrow-right"></i></button>
  </form>
  <hr class="divider"/>
  <div class="auth-footer">Don't have an account? <a href="{% url 'tenants:register' %}">Sign up free</a></div>
  <div class="auth-footer" style="margin-top:8px;">Are you a landlord? <a href="{% url 'landlords:login' %}">Landlord login</a></div>
  <div class="auth-footer" style="margin-top:8px;"><a href="{% url 'tenants:landing' %}">← Back to home</a></div>
</div>
</body>
</html>
